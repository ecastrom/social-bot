services:
  - type: web
    name: edgar-threads-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn telegram_bot:app
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: THREADS_APP_ID
        sync: false
      - key: THREADS_APP_SECRET
        sync: false
      - key: THREADS_ACCESS_TOKEN
        sync: false
      - key: THREADS_USER_ID
        sync: false
